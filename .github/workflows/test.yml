# Two-leg test pipeline: frontend (Vitest under jsdom) and backend (pytest +
# pytest-django against the in-memory SQLite test DB). Runs on every push +
# PR so regressions land before review. Kept intentionally simple — no
# caching of node_modules / pip yet; add when the runs start hurting.
name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (non-blocking — pre-existing issues tracked in #75)
        run: npm run lint
        continue-on-error: true
      - name: Test
        run: npm run test:run
      - name: Build (smoke)
        run: npm run build

  backend:
    name: Backend (pytest-django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Migrate (sanity)
        run: python manage.py migrate --noinput
      - name: Test
        run: pytest -q
